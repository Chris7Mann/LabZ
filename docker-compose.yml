services:
  web:
    build: .
    container_name: labz-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
    volumes:
      - type: bind
        source: .
        target: /app
      - /app/node_modules
      - /app/.next
      
    command: npm run dev